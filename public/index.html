<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>Graph</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="graph"></div>

    <button id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background:violet;"></div>
            <strong>peer dependencies</strong>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:blue;"></div>
            <strong>optional peer dependencies</strong>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:green;"></div>
            <strong>dependencies</strong>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:yellow;"></div>
            <strong>dev dependencies</strong>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:red;"></div>
            <strong>required intervention</strong>
        </div>
        <a href="chart">chart</a>
        <br>
        <button id="refresh">Refresh</button>
        <br><br>
        The following dependencies have
        <br>
        minor/major version mismatches:
        <br>
        <div id="intervention-notice"></div>
    </div>

    <script type="module" src="dist/index.js"></script>
</body>

</html>
